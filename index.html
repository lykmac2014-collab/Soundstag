<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNDTAG | Media Button</title>
    <style>
        /* Базовые стили страницы */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000 url('ф.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Стиль изображения-кнопки к.png */
        #main-btn {
            cursor: pointer;
            max-width: 85vw;
            max-height: 80vh;
            border-radius: 10px; /* Скругление */
            
            /* Плавный возврат в исходное состояние */
            transition: transform 0.1s ease-out;
            -webkit-tap-highlight-color: transparent; /* Убирает рамку на мобильных */
        }

        /* Класс для активного нажатия (вибрация начинается сразу) */
        #main-btn:active {
            animation: shake 0.1s infinite;
        }

        /* Класс, который добавляется через JavaScript, когда звук играет */
        #main-btn.playing {
            animation: vibrate 0.2s infinite linear;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Анимация вибрации для класса .playing (более быстрая и хаотичная) */
        @keyframes vibrate {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Анимация тряски для состояния :active (для мгновенного отклика) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

    <img src="к.png" id="main-btn" alt="Media Button" onclick="toggleAudio()">

    <audio id="player" src="з.m4a" loop></audio>

    <script>
        const audio = document.getElementById('player');
        const btn = document.getElementById('main-btn');
        
        function toggleAudio() {
            if (audio.paused) {
                audio.play()
                    .then(() => {
                        // Звук запущен успешно
                        btn.classList.add('playing'); // Включаем вибрацию
                    })
                    .catch(e => console.log("Ошибка воспроизведения:", e));
            } else {
                audio.pause();
                audio.currentTime = 0; // Сброс звука
                btn.classList.remove('playing'); // Выключаем вибрацию
            }
        }
    </script>

</body>
</html>
